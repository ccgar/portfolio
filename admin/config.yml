backend:
  name: github
  repo: ccgar/portfolio
  branch: main
  base_url: https://christiangaravito-cms-auth.chrisgara4.workers.dev

media_folder: "images"
public_folder: "images"

collections:

  # ─── HERO ───
  - name: "hero"
    label: "Hero"
    files:
      - name: "hero"
        label: "Hero"
        file: "hero.json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Description (use <strong> for highlights)", name: "description", widget: "markdown" }
          - { label: "Badge", name: "badge", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }

  # ─── STATS ───
  - name: "stats"
    label: "Stats"
    files:
      - name: "stats"
        label: "Stats"
        file: "stats.json"
        fields:
          - label: "Stats"
            name: "root"
            widget: "list"
            fields:
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Context", name: "context", widget: "markdown" }

  # ─── CASE STUDIES ───
  - name: "projects"
    label: "Case Studies"
    files:
      - name: "projects"
        label: "Case Studies"
        file: "projects.json"
        fields:
          - label: "BlackRock"
            name: "blackrock"
            widget: "object"
            fields: &project_fields
              - { label: "Case Number", name: "number", widget: "string" }
              - { label: "Card Title", name: "cardTitle", widget: "string" }
              - { label: "Full Title", name: "title", widget: "string" }
              - { label: "Company", name: "company", widget: "string" }
              - label: "Meta"
                name: "meta"
                widget: "object"
                fields:
                  - { label: "Role", name: "Role", widget: "string" }
                  - { label: "Industry", name: "Industry", widget: "string" }
                  - { label: "Duration", name: "Duration", widget: "string" }
                  - { label: "Team", name: "Team", widget: "string" }
              - { label: "Tags", name: "tags", widget: "list" }
              - { label: "Row", name: "row", widget: "number", value_type: "int" }
              - { label: "Problem", name: "problem", widget: "markdown" }
              - { label: "Process", name: "process", widget: "markdown" }
              - { label: "Outcome", name: "outcome", widget: "markdown" }
              - label: "Metrics"
                name: "metrics"
                widget: "list"
                fields:
                  - { label: "Value", name: "value", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - label: "Size"
                    name: "size"
                    widget: "select"
                    options: ["full", "half", "small"]
                    default: "full"
                  - label: "Caption overlay (optional)"
                    name: "caption"
                    widget: "object"
                    required: false
                    collapsed: true
                    fields:
                      - { label: "Icon (emoji)", name: "icon", widget: "string", required: false }
                      - { label: "Title", name: "title", widget: "string", required: false }
                      - { label: "Text", name: "text", widget: "text", required: false }
                      - label: "Position"
                        name: "position"
                        widget: "select"
                        options: ["top-left", "top-right", "bottom-left", "bottom-right"]
                        default: "bottom-left"
                        required: false
          - label: "BDO"
            name: "bdo"
            widget: "object"
            fields: *project_fields
          - label: "Blink"
            name: "blink"
            widget: "object"
            fields: *project_fields
          - label: "RIMAC"
            name: "rimac"
            widget: "object"
            fields: *project_fields
          - label: "HP AI"
            name: "hpai"
            widget: "object"
            fields: *project_fields
          - label: "Stanley Black & Decker"
            name: "sbd"
            widget: "object"
            fields: *project_fields

  # ─── ABOUT & EXPERIENCE ───
  - name: "about"
    label: "About & Experience"
    files:
      - name: "about"
        label: "About & Experience"
        file: "about.json"
        fields:
          - { label: "Bio", name: "bio", widget: "markdown" }
          - label: "Timeline"
            name: "timeline"
            widget: "list"
            fields:
              - { label: "Date range", name: "date", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Company", name: "company", widget: "string" }
              - { label: "Description", name: "desc", widget: "markdown" }

  # ─── TESTIMONIALS ───
  - name: "testimonials"
    label: "Testimonials"
    files:
      - name: "testimonials"
        label: "Testimonials"
        file: "testimonials.json"
        fields:
          - label: "Testimonials"
            name: "root"
            widget: "list"
            fields:
              - { label: "Quote", name: "quote", widget: "markdown" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role & Company", name: "role", widget: "string" }

  # ─── CONTACT ───
  - name: "contact"
    label: "Contact"
    files:
      - name: "contact"
        label: "Contact"
        file: "contact.json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string" }
