backend:
  name: github
  repo: ccgar/portfolio
  branch: main
  base_url: https://christiangaravito-cms-auth.chrisgara4.workers.dev

media_folder: "."
public_folder: "."

collections:
  - name: "projects"
    label: "Case Studies"
    files:
      - name: "all_projects"
        label: "All Projects"
        file: "data.json"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "object"
            fields:
              - label: "BlackRock"
                name: "blackrock"
                widget: "object"
                fields: &project_fields
                  - { label: "Case Number", name: "number", widget: "string" }
                  - { label: "Card Title", name: "cardTitle", widget: "string" }
                  - { label: "Full Title", name: "title", widget: "string" }
                  - { label: "Company", name: "company", widget: "string" }
                  - label: "Meta Data"
                    name: "meta"
                    widget: "object"
                    fields:
                      - { label: "Role", name: "Role", widget: "string" }
                      - { label: "Industry", name: "Industry", widget: "string" }
                      - { label: "Duration", name: "Duration", widget: "string" }
                      - { label: "Team", name: "Team", widget: "string" }
                  - { label: "Tags", name: "tags", widget: "list" }
                  - { label: "Row", name: "row", widget: "number", value_type: "int" }
                  - { label: "Problem", name: "problem", widget: "markdown" }
                  - { label: "Process", name: "process", widget: "markdown" }
                  - { label: "Outcome", name: "outcome", widget: "markdown" }
                  - label: "Metrics"
                    name: "metrics"
                    widget: "list"
                    fields:
                      - { label: "Value", name: "value", widget: "string" }
                      - { label: "Label", name: "label", widget: "string" }
                  - label: "Images"
                    name: "images"
                    widget: "list"
                    fields:
                      - { label: "File", name: "src", widget: "string", hint: "Filename e.g. BLK-1.png" }
                      - label: "Size"
                        name: "size"
                        widget: "select"
                        options: ["full", "half", "small"]
                        default: "full"
              - label: "BDO"
                name: "bdo"
                widget: "object"
                fields: *project_fields
              - label: "Blink"
                name: "blink"
                widget: "object"
                fields: *project_fields
              - label: "RIMAC"
                name: "rimac"
                widget: "object"
                fields: *project_fields
              - label: "HP AI"
                name: "hpai"
                widget: "object"
                fields: *project_fields
              - label: "Stanley Black & Decker"
                name: "sbd"
                widget: "object"
                fields: *project_fields

  - name: "site"
    label: "Site Settings"
    files:
      - name: "hero"
        label: "Hero & Stats"
        file: "data.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Badge text", name: "badge", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Description", name: "description", widget: "markdown" }
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Context", name: "context", widget: "string" }